    <html>
    <head>
        <title>M3 Migration Auditor</title>
        <style>
            :root { --primary: #007bff; --danger: #dc3545; --success: #28a745; --bg: #f4f6f9; }
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
            .container { max-width: 1200px; margin: 0 auto; }
            .card { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 20px; }
            
            table { width: 100%; border-collapse: collapse; }
            th { background: #f8f9fa; color: #495057; font-weight: 600; text-align: left; padding: 12px 15px; border-bottom: 2px solid #dee2e6; }
            td { padding: 12px 15px; border-bottom: 1px solid #dee2e6; color: #333; }
            tr:hover { background-color: #f1f3f5; cursor: pointer; }
            
            .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
            .badge-ok { background: #d4edda; color: #155724; }
            .badge-fail { background: #f8d7da; color: #721c24; }
            .badge-warn { background: #fff3cd; color: #856404; }

            /* Modal */
            .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
            .modal-content { position: relative; background: white; width: 95%; max-width: 1300px; margin: 30px auto; height: 90%; border-radius: 8px; display: flex; flex-direction: column; }
            .modal-header { padding: 15px 20px; border-bottom: 1px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: white; border-radius: 8px 8px 0 0; }
            .modal-body { padding: 0; overflow-y: hidden; flex: 1; display: flex; flex-direction: column; }
            .close-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
            
            /* Controls Area */
            .controls-bar { padding: 15px 20px; background: #f8f9fa; border-bottom: 1px solid #dee2e6; display: flex; gap: 20px; align-items: center; }
            .toggle-label { font-size: 0.9em; font-weight: 500; display: flex; align-items: center; cursor: pointer; }
            .toggle-label input { margin-right: 8px; transform: scale(1.2); }

            /* Tabs */
            .tabs-scroll { overflow-x: auto; white-space: nowrap; padding: 0 20px; border-bottom: 1px solid #dee2e6; background: white; }
            .tab { display: inline-block; padding: 12px 20px; cursor: pointer; border-bottom: 3px solid transparent; color: #6c757d; font-weight: 500; }
            .tab:hover { background: #f8f9fa; }
            .tab.active { border-bottom-color: var(--primary); color: var(--primary); }
            .tab.active.tab-error { border-bottom-color: var(--danger); color: var(--danger); }
            .tab-error { color: var(--danger); }
            .tab-ignored { font-style: italic; opacity: 0.6; }

            /* Grid */
            .grid-wrapper { flex: 1; overflow-y: auto; padding: 0; }
            .detail-row.ok { background-color: #fff; }
            .detail-row.nok { background-color: #fff5f5; border-left: 5px solid var(--danger); }
            .detail-row.ok.hidden { display: none; }
        </style>

                    // If current sheet isn't in the new list, switch
                    loadSheet(currentSheetName && file.Sheets[currentSheetName] && (showAllSheets || file.Sheets[currentSheetName].Executed) ? currentSheetName : firstVisibleSheet);
                    // Update tab active state visually
                     document.querySelectorAll('.tab').forEach(t => {
                        if(t.innerText.includes(currentSheetName)) t.classList.add('active');
                    });
                } else {
                    document.getElementById('gridContainer').innerHTML = '<p style="padding:20px">No executed sheets found in log. Enable "Show Skipped Sheets" to view data.</p>';
                }
            }

            function loadSheet(sheetName) {
                currentSheetName = sheetName;
                const grid = document.getElementById('gridContainer');
                const rows = reportData[currentFileIndex].Sheets[sheetName].Rows;
                
                let html = '<table style="width:100%;"><thead><tr><th style="width:60px">Line</th><th style="width:200px">ID</th><th style="width:80px">Status</th><th>Message</th></tr></thead><tbody>';
                
                rows.forEach(row => {
                    const rowClass = row.Status === 'OK' ? 'ok hidden' : 'nok'; 
                    html += `<tr class="detail-row ${rowClass}">
                        <td>${row.Line}</td>
                        <td>${row.ID}</td>
                        <td><strong>${row.Status}</strong></td>
                        <td>${row.Message}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                grid.innerHTML = html;
                
                toggleRows();
            }

            function toggleRows() {
                const showOk = document.getElementById('showOkToggle').checked;
                const rows = document.querySelectorAll('.detail-row.ok');
                rows.forEach(row => {
                    row.style.display = showOk ? 'table-row' : 'none';
                });
            }

            function closeModal() {
                document.getElementById('detailModal').style.display = 'none';
            }
            
            window.onclick = function(event) {
                if (event.target == document.getElementById('detailModal')) closeModal();
            }

            initDashboard();
        </script>
    </body>
    </html>
